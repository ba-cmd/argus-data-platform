name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Crée un .env de test pour la validation
        run: cp infra/docker/.env.example infra/docker/.env

      - name: Valide la syntaxe du docker-compose.yml
        run: cd infra/docker && docker compose --profile core config
